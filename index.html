<!-- ============================================================
     MOXIE COMPANY PERFORMANCE DASHBOARD

     ASSET STRUCTURE (externalized for GitHub Pages hosting):
       assets/bootstrap.js  - CDN library loader + early data prefetch
                              (defines window.__libsReady). Runs first.
       assets/app.css       - all styles (verbatim from the original).
       assets/preflight.js  - shows a readable message if a CDN is blocked.
       assets/app.js        - the application (runs on __libsReady).
     Core libraries (React/ReactDOM/Recharts) load from cdnjs with an
     unpkg fallback -- see bootstrap.js.
     ============================================================ -->

<!-- Bootstrap: kicks off the data prefetch + library downloads immediately,
     exactly as the original inline script did. Must run before app.js. -->
<script src="assets/bootstrap.js"></script>

<!-- All application styles. -->
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<div id="root"></div>

<!-- Pre-flight: if a CDN library is blocked, show a readable message instead of a blank page. -->
<script src="assets/preflight.js"></script>

<!-- App (pre-transpiled to plain React.createElement JS; no in-browser compiler needed).
     Waits on window.__libsReady (from bootstrap.js) before mounting. -->
<script src="assets/app.js"></script>
</body>
